<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="520" viewBox="0 0 1160 520" role="img" aria-label="Node.js streams and buffers overview">
<defs>
<style>
.bg { fill: #f7fafc; }
.title { font: 700 30px Segoe UI, Arial, sans-serif; fill: #2d5d8a; }
.subtitle { font: 600 16px Segoe UI, Arial, sans-serif; fill: #4a5568; }
.box { fill: #ffffff; stroke: #2d5d8a; stroke-width: 2.4; rx: 18; ry: 18; }
.boxAlt { fill: #edf6ff; stroke: #2d5d8a; stroke-width: 2.4; rx: 18; ry: 18; }
.text { font: 700 18px Segoe UI, Arial, sans-serif; fill: #2d5d8a; }
.small { font: 600 14px Segoe UI, Arial, sans-serif; fill: #4a5568; }
.line { stroke: #2d5d8a; stroke-width: 3; fill: none; }
</style>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<path d="M0,0 L0,6 L9,3 z" fill="#2d5d8a" />
</marker>
</defs>
<rect class="bg" width="1160" height="520" />
<text x="40" y="54" class="title">Node.js Streams and Buffers</text>
<text x="40" y="84" class="subtitle">Chunk-by-chunk processing, backpressure, pipelines, and binary data handling</text>

<rect x="50" y="140" width="180" height="110" class="boxAlt" />
<text x="140" y="180" text-anchor="middle" class="text">Readable</text>
<text x="140" y="206" text-anchor="middle" class="small">files, HTTP requests,</text>
<text x="140" y="228" text-anchor="middle" class="small">sockets</text>

<rect x="290" y="140" width="180" height="110" class="box" />
<text x="380" y="180" text-anchor="middle" class="text">Transform</text>
<text x="380" y="206" text-anchor="middle" class="small">gzip, encryption,</text>
<text x="380" y="228" text-anchor="middle" class="small">parsers</text>

<rect x="530" y="140" width="180" height="110" class="boxAlt" />
<text x="620" y="180" text-anchor="middle" class="text">Writable</text>
<text x="620" y="206" text-anchor="middle" class="small">files, HTTP responses,</text>
<text x="620" y="228" text-anchor="middle" class="small">storage</text>

<rect x="770" y="140" width="170" height="110" class="box" />
<text x="855" y="180" text-anchor="middle" class="text">Backpressure</text>
<text x="855" y="206" text-anchor="middle" class="small">write false, drain,</text>
<text x="855" y="228" text-anchor="middle" class="small">highWaterMark</text>

<rect x="990" y="140" width="120" height="110" class="box" />
<text x="1050" y="180" text-anchor="middle" class="text">Pipeline</text>
<text x="1050" y="206" text-anchor="middle" class="small">safe chaining</text>

<rect x="180" y="320" width="210" height="120" class="box" />
<text x="285" y="360" text-anchor="middle" class="text">Buffers</text>
<text x="285" y="386" text-anchor="middle" class="small">binary data, bytes,</text>
<text x="285" y="408" text-anchor="middle" class="small">encodings</text>

<rect x="450" y="320" width="240" height="120" class="boxAlt" />
<text x="570" y="360" text-anchor="middle" class="text">File Streaming</text>
<text x="570" y="386" text-anchor="middle" class="small">logs, videos, large datasets</text>
<text x="570" y="408" text-anchor="middle" class="small">without full memory load</text>

<rect x="750" y="320" width="210" height="120" class="box" />
<text x="855" y="360" text-anchor="middle" class="text">Utilities</text>
<text x="855" y="386" text-anchor="middle" class="small">pipeline, finished,</text>
<text x="855" y="408" text-anchor="middle" class="small">Readable.from</text>

<path class="line" marker-end="url(#arrow)" d="M230 195 H290" />
<path class="line" marker-end="url(#arrow)" d="M470 195 H530" />
<path class="line" marker-end="url(#arrow)" d="M710 195 H770" />
<path class="line" marker-end="url(#arrow)" d="M940 195 H990" />
<path class="line" marker-end="url(#arrow)" d="M380 250 V300" />
<path class="line" marker-end="url(#arrow)" d="M620 250 V300" />
<path class="line" marker-end="url(#arrow)" d="M855 250 V300" />
</svg>
