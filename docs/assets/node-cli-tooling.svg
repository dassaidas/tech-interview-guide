<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Node.js CLI Tooling Architecture</title>
  <desc id="desc">Diagram showing command parsing, npm scripts, package publishing, developer workflow tooling, and internal CLI ecosystem usage in Node.js.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef7f2"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6fafc"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#19324d" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2f5c8a"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="60" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#17324d">Node.js CLI Tooling</text>
  <text x="60" y="106" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#47627d">Command parsing, task automation, package publishing, developer workflow tooling, and internal CLI ecosystems</text>

  <rect x="70" y="145" rx="24" ry="24" width="220" height="120" fill="url(#panel)" stroke="#8cb3d9" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="192" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#17324d">CLI Commands</text>
  <text x="180" y="224" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">Commander / Yargs</text>

  <rect x="340" y="125" rx="24" ry="24" width="240" height="150" fill="url(#panel)" stroke="#79a66a" stroke-width="2" filter="url(#shadow)"/>
  <text x="460" y="170" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#17324d">Task Automation</text>
  <text x="460" y="200" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">npm scripts / cross-env</text>
  <text x="460" y="228" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">Seed, migrate, build, test</text>

  <rect x="650" y="125" rx="24" ry="24" width="220" height="150" fill="url(#panel)" stroke="#d8a24a" stroke-width="2" filter="url(#shadow)"/>
  <text x="760" y="170" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#17324d">Packages</text>
  <text x="760" y="200" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">bin, semver, publish</text>
  <text x="760" y="228" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">Internal and public reuse</text>

  <rect x="930" y="125" rx="24" ry="24" width="220" height="150" fill="url(#panel)" stroke="#9f7cd6" stroke-width="2" filter="url(#shadow)"/>
  <text x="1040" y="170" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#17324d">Developer UX</text>
  <text x="1040" y="200" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">chalk, ora, inquirer</text>
  <text x="1040" y="228" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">Readable and guided tooling</text>

  <rect x="120" y="430" rx="28" ry="28" width="260" height="190" fill="url(#panel)" stroke="#79a66a" stroke-width="2" filter="url(#shadow)"/>
  <text x="250" y="478" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#17324d">Workflow Hooks</text>
  <text x="250" y="510" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">Husky / lint-staged</text>
  <text x="250" y="538" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">Quality before commit</text>

  <rect x="450" y="430" rx="28" ry="28" width="280" height="190" fill="url(#panel)" stroke="#d8a24a" stroke-width="2" filter="url(#shadow)"/>
  <text x="590" y="478" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#17324d">Packaging Strategy</text>
  <text x="590" y="510" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">Bundling, dual packages, startup speed</text>
  <text x="590" y="538" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">Maintainable internal tools</text>

  <rect x="820" y="430" rx="28" ry="28" width="300" height="190" fill="url(#panel)" stroke="#8cb3d9" stroke-width="2" filter="url(#shadow)"/>
  <text x="970" y="478" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#17324d">Team Productivity</text>
  <text x="970" y="510" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">Shared commands, fewer manual steps</text>
  <text x="970" y="538" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">Consistent local and CI behavior</text>

  <path d="M290 205 H340" stroke="#2f5c8a" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M580 205 H650" stroke="#2f5c8a" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M870 205 H930" stroke="#2f5c8a" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M460 275 V350 H250 V430" stroke="#2f5c8a" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M760 275 V350 H590 V430" stroke="#2f5c8a" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M1040 275 V350 H970 V430" stroke="#2f5c8a" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <rect x="60" y="660" rx="18" ry="18" width="1080" height="62" fill="#17324d" opacity="0.92"/>
  <text x="90" y="700" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#ffffff">Flow: parse commands → automate tasks → package and publish safely → improve developer workflows with reusable internal tooling</text>
</svg>
