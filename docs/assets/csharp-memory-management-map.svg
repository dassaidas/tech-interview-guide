<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">C# Memory Management and Performance Interview Map</title>
  <desc id="desc">A visual map of garbage collection, stack and heap, IDisposable, finalizers, and memory leaks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#172554"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="430" fill="url(#bg)"/>
  <text x="54" y="64" fill="#eff6ff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">
    C# Memory Management and Performance
  </text>
  <text x="54" y="102" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    Practical interview map from GC basics to leaks, disposal, and hidden allocation pitfalls
  </text>

  <rect x="48" y="148" width="250" height="190" rx="18" fill="#0f766e"/>
  <text x="74" y="190" fill="#ecfeff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Garbage Collection</text>
  <text x="74" y="220" fill="#ccfbf1" font-family="Segoe UI, Arial, sans-serif" font-size="16">Gen 0, 1, 2</text>
  <text x="74" y="244" fill="#ccfbf1" font-family="Segoe UI, Arial, sans-serif" font-size="16">Roots and reachability</text>
  <text x="74" y="268" fill="#ccfbf1" font-family="Segoe UI, Arial, sans-serif" font-size="16">LOH and compaction</text>
  <text x="74" y="292" fill="#ccfbf1" font-family="Segoe UI, Arial, sans-serif" font-size="16">Allocation pressure</text>

  <rect x="322" y="148" width="220" height="190" rx="18" fill="#7c3aed"/>
  <text x="348" y="190" fill="#f5f3ff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Stack vs Heap</text>
  <text x="348" y="220" fill="#ede9fe" font-family="Segoe UI, Arial, sans-serif" font-size="16">Frames and locals</text>
  <text x="348" y="244" fill="#ede9fe" font-family="Segoe UI, Arial, sans-serif" font-size="16">Value vs reference</text>
  <text x="348" y="268" fill="#ede9fe" font-family="Segoe UI, Arial, sans-serif" font-size="16">Boxing</text>
  <text x="348" y="292" fill="#ede9fe" font-family="Segoe UI, Arial, sans-serif" font-size="16">Hidden allocations</text>

  <rect x="566" y="148" width="250" height="190" rx="18" fill="#b45309"/>
  <text x="592" y="190" fill="#fff7ed" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">IDisposable</text>
  <text x="592" y="220" fill="#ffedd5" font-family="Segoe UI, Arial, sans-serif" font-size="16">using / using var</text>
  <text x="592" y="244" fill="#ffedd5" font-family="Segoe UI, Arial, sans-serif" font-size="16">Finalizer cost</text>
  <text x="592" y="268" fill="#ffedd5" font-family="Segoe UI, Arial, sans-serif" font-size="16">SuppressFinalize</text>
  <text x="592" y="292" fill="#ffedd5" font-family="Segoe UI, Arial, sans-serif" font-size="16">Ownership</text>

  <rect x="840" y="148" width="310" height="190" rx="18" fill="#be123c"/>
  <text x="866" y="190" fill="#fff1f2" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Leaks and Diagnostics</text>
  <text x="866" y="220" fill="#ffe4e6" font-family="Segoe UI, Arial, sans-serif" font-size="16">Events and static roots</text>
  <text x="866" y="244" fill="#ffe4e6" font-family="Segoe UI, Arial, sans-serif" font-size="16">Timers and closures</text>
  <text x="866" y="268" fill="#ffe4e6" font-family="Segoe UI, Arial, sans-serif" font-size="16">Unmanaged resources</text>
  <text x="866" y="292" fill="#ffe4e6" font-family="Segoe UI, Arial, sans-serif" font-size="16">Dump analysis patterns</text>
</svg>
