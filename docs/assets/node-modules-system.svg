<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="520" viewBox="0 0 1160 520" role="img" aria-label="Node.js module systems overview">
<defs>
<style>
.bg { fill: #f7fafc; }
.title { font: 700 30px Segoe UI, Arial, sans-serif; fill: #2d5d8a; }
.subtitle { font: 600 16px Segoe UI, Arial, sans-serif; fill: #4a5568; }
.box { fill: #ffffff; stroke: #2d5d8a; stroke-width: 2.4; rx: 18; ry: 18; }
.boxAlt { fill: #edf6ff; stroke: #2d5d8a; stroke-width: 2.4; rx: 18; ry: 18; }
.text { font: 700 18px Segoe UI, Arial, sans-serif; fill: #2d5d8a; }
.small { font: 600 14px Segoe UI, Arial, sans-serif; fill: #4a5568; }
.line { stroke: #2d5d8a; stroke-width: 3; fill: none; }
</style>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<path d="M0,0 L0,6 L9,3 z" fill="#2d5d8a" />
</marker>
</defs>
<rect class="bg" width="1160" height="520" />
<text x="40" y="54" class="title">Node.js Module Systems</text>
<text x="40" y="84" class="subtitle">CommonJS, ES Modules, resolution, caching, dynamic import, and package.json behavior</text>

<rect x="50" y="130" width="190" height="100" class="boxAlt" />
<text x="145" y="165" text-anchor="middle" class="text">Application Code</text>
<text x="145" y="190" text-anchor="middle" class="small">services, routes, scripts</text>

<rect x="290" y="110" width="200" height="120" class="box" />
<text x="390" y="150" text-anchor="middle" class="text">CommonJS</text>
<text x="390" y="176" text-anchor="middle" class="small">require, exports,</text>
<text x="390" y="198" text-anchor="middle" class="small">module.exports</text>

<rect x="540" y="110" width="200" height="120" class="box" />
<text x="640" y="150" text-anchor="middle" class="text">ES Modules</text>
<text x="640" y="176" text-anchor="middle" class="small">import, export,</text>
<text x="640" y="198" text-anchor="middle" class="small">top-level await</text>

<rect x="790" y="110" width="300" height="120" class="boxAlt" />
<text x="940" y="150" text-anchor="middle" class="text">Resolution Rules</text>
<text x="940" y="176" text-anchor="middle" class="small">relative paths, node_modules, file types,</text>
<text x="940" y="198" text-anchor="middle" class="small">package.json type and exports</text>

<rect x="180" y="310" width="210" height="120" class="box" />
<text x="285" y="350" text-anchor="middle" class="text">Caching</text>
<text x="285" y="376" text-anchor="middle" class="small">loaded once, shared state,</text>
<text x="285" y="398" text-anchor="middle" class="small">require.cache</text>

<rect x="440" y="310" width="220" height="120" class="box" />
<text x="550" y="350" text-anchor="middle" class="text">Interop</text>
<text x="550" y="376" text-anchor="middle" class="small">CJS ↔ ESM, createRequire,</text>
<text x="550" y="398" text-anchor="middle" class="small">default export wrapping</text>

<rect x="710" y="310" width="220" height="120" class="box" />
<text x="820" y="350" text-anchor="middle" class="text">Dynamic import()</text>
<text x="820" y="376" text-anchor="middle" class="small">async loading, lazy paths,</text>
<text x="820" y="398" text-anchor="middle" class="small">conditional loading</text>

<rect x="980" y="310" width="130" height="120" class="box" />
<text x="1045" y="350" text-anchor="middle" class="text">Advanced</text>
<text x="1045" y="376" text-anchor="middle" class="small">tree shaking,</text>
<text x="1045" y="398" text-anchor="middle" class="small">circular deps</text>

<path class="line" marker-end="url(#arrow)" d="M240 180 H290" />
<path class="line" marker-end="url(#arrow)" d="M490 170 H540" />
<path class="line" marker-end="url(#arrow)" d="M740 170 H790" />
<path class="line" marker-end="url(#arrow)" d="M390 230 V290" />
<path class="line" marker-end="url(#arrow)" d="M640 230 V290" />
<path class="line" marker-end="url(#arrow)" d="M940 230 V290" />
<path class="line" marker-end="url(#arrow)" d="M390 350 H440" />
<path class="line" marker-end="url(#arrow)" d="M660 350 H710" />
<path class="line" marker-end="url(#arrow)" d="M930 350 H980" />
</svg>
