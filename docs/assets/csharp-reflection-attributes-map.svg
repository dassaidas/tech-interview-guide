<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">C# Reflection, Attributes, and DI Internals Interview Map</title>
  <desc id="desc">A visual map of reflection APIs, custom attributes, and dependency injection internals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="430" fill="url(#bg)"/>
  <text x="54" y="64" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">
    C# Reflection, Attributes, and DI Internals
  </text>
  <text x="54" y="102" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    Practical interview map from metadata inspection to attribute-driven design and container behavior
  </text>

  <rect x="70" y="150" width="320" height="190" rx="18" fill="#1d4ed8"/>
  <text x="96" y="192" fill="#eff6ff" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Reflection API</text>
  <text x="96" y="224" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="16">Type discovery</text>
  <text x="96" y="248" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="16">Method and property access</text>
  <text x="96" y="272" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="16">Dynamic activation</text>
  <text x="96" y="296" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="16">Caching and performance</text>

  <rect x="440" y="150" width="320" height="190" rx="18" fill="#0f766e"/>
  <text x="466" y="192" fill="#ecfeff" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Custom Attributes</text>
  <text x="466" y="224" fill="#ccfbf1" font-family="Segoe UI, Arial, sans-serif" font-size="16">Metadata annotations</text>
  <text x="466" y="248" fill="#ccfbf1" font-family="Segoe UI, Arial, sans-serif" font-size="16">Runtime discovery</text>
  <text x="466" y="272" fill="#ccfbf1" font-family="Segoe UI, Arial, sans-serif" font-size="16">Validation and mapping</text>
  <text x="466" y="296" fill="#ccfbf1" font-family="Segoe UI, Arial, sans-serif" font-size="16">Framework-style patterns</text>

  <rect x="810" y="150" width="320" height="190" rx="18" fill="#7c3aed"/>
  <text x="836" y="192" fill="#f5f3ff" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">DI Internals</text>
  <text x="836" y="224" fill="#ede9fe" font-family="Segoe UI, Arial, sans-serif" font-size="16">Service registration</text>
  <text x="836" y="248" fill="#ede9fe" font-family="Segoe UI, Arial, sans-serif" font-size="16">Constructor resolution</text>
  <text x="836" y="272" fill="#ede9fe" font-family="Segoe UI, Arial, sans-serif" font-size="16">Lifetimes and scopes</text>
  <text x="836" y="296" fill="#ede9fe" font-family="Segoe UI, Arial, sans-serif" font-size="16">Reflection-driven activation</text>
</svg>
