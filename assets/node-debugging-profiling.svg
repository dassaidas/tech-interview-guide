<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Node.js Debugging and Profiling Architecture</title>
  <desc id="desc">Diagram showing inspector, DevTools, CPU profiles, heap snapshots, event loop lag, and production-safe diagnostics for Node.js services.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6f9fc"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#19324d" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2f5c8a"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="60" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#17324d">Node.js Debugging and Profiling</text>
  <text x="60" y="106" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#47627d">Inspector, DevTools, heap snapshots, CPU profiling, event loop lag, and production-safe diagnostics</text>

  <rect x="70" y="145" rx="24" ry="24" width="210" height="120" fill="url(#panel)" stroke="#8cb3d9" stroke-width="2" filter="url(#shadow)"/>
  <text x="175" y="192" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#17324d">Runtime</text>
  <text x="175" y="224" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">API / Worker / Service</text>

  <rect x="330" y="125" rx="24" ry="24" width="220" height="150" fill="url(#panel)" stroke="#79a66a" stroke-width="2" filter="url(#shadow)"/>
  <text x="440" y="170" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#17324d">Inspector + DevTools</text>
  <text x="440" y="200" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">Breakpoints, stepping, watches</text>
  <text x="440" y="228" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">Live debugging and traces</text>

  <rect x="620" y="125" rx="24" ry="24" width="220" height="150" fill="url(#panel)" stroke="#d8a24a" stroke-width="2" filter="url(#shadow)"/>
  <text x="730" y="170" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#17324d">CPU Analysis</text>
  <text x="730" y="200" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">Profiles, flame graphs, hot paths</text>
  <text x="730" y="228" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">Blocking work and lag</text>

  <rect x="910" y="125" rx="24" ry="24" width="220" height="150" fill="url(#panel)" stroke="#9f7cd6" stroke-width="2" filter="url(#shadow)"/>
  <text x="1020" y="170" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#17324d">Memory Analysis</text>
  <text x="1020" y="200" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">Heap snapshots, GC, RSS</text>
  <text x="1020" y="228" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">Leaks and retained objects</text>

  <rect x="120" y="430" rx="28" ry="28" width="270" height="190" fill="url(#panel)" stroke="#79a66a" stroke-width="2" filter="url(#shadow)"/>
  <text x="255" y="478" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#17324d">Load and Reproduction</text>
  <text x="255" y="510" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">autocannon, Clinic.js</text>
  <text x="255" y="538" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">Reproduce under realistic pressure</text>

  <rect x="470" y="430" rx="28" ry="28" width="280" height="190" fill="url(#panel)" stroke="#d8a24a" stroke-width="2" filter="url(#shadow)"/>
  <text x="610" y="478" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#17324d">Slow Path Diagnosis</text>
  <text x="610" y="510" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">Endpoint timing, async stacks, traces</text>
  <text x="610" y="538" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">Route, DB, middleware breakdown</text>

  <rect x="820" y="430" rx="28" ry="28" width="300" height="190" fill="url(#panel)" stroke="#8cb3d9" stroke-width="2" filter="url(#shadow)"/>
  <text x="970" y="478" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#17324d">Production-Safe Strategy</text>
  <text x="970" y="510" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">Low-risk probes, health, approvals</text>
  <text x="970" y="538" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#47627d">Diagnose without destabilizing</text>

  <path d="M280 205 H330" stroke="#2f5c8a" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M550 205 H620" stroke="#2f5c8a" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M840 205 H910" stroke="#2f5c8a" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M440 275 V350 H255 V430" stroke="#2f5c8a" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M730 275 V350 H610 V430" stroke="#2f5c8a" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M1020 275 V350 H970 V430" stroke="#2f5c8a" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <rect x="60" y="660" rx="18" ry="18" width="1080" height="62" fill="#17324d" opacity="0.92"/>
  <text x="90" y="700" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#ffffff">Flow: reproduce the symptom → choose the right CPU, memory, or lag tool → inspect safely → verify the real bottleneck before changing code</text>
</svg>
