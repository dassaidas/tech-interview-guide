<text x="495" y="152" text-anchor="middle" class="text">Binding</text>
<rect x="618" y="118" width="140" height="92" class="box" />
<text x="688" y="152" text-anchor="middle" class="text">Logic</text>
<rect x="810" y="118" width="140" height="92" class="box" />
