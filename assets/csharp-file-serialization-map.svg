<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">C# File Handling and Serialization Interview Map</title>
  <desc id="desc">A visual map of file I O, JSON and XML serialization, and binary serialization topics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="430" fill="url(#bg)"/>
  <text x="54" y="64" fill="#f9fafb" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">
    C# File Handling and Serialization
  </text>
  <text x="54" y="102" fill="#d1d5db" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    Practical interview map for file I/O, JSON, XML, and binary data patterns
  </text>

  <rect x="60" y="150" width="320" height="190" rx="18" fill="#1d4ed8"/>
  <text x="88" y="192" fill="#eff6ff" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">File I/O</text>
  <text x="88" y="224" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="16">File, Directory, Path</text>
  <text x="88" y="248" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="16">StreamReader / StreamWriter</text>
  <text x="88" y="272" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="16">FileStream and buffering</text>
  <text x="88" y="296" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="16">Async file processing</text>

  <rect x="430" y="150" width="340" height="190" rx="18" fill="#0f766e"/>
  <text x="458" y="192" fill="#ecfeff" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">JSON / XML</text>
  <text x="458" y="224" fill="#ccfbf1" font-family="Segoe UI, Arial, sans-serif" font-size="16">System.Text.Json</text>
  <text x="458" y="248" fill="#ccfbf1" font-family="Segoe UI, Arial, sans-serif" font-size="16">Newtonsoft.Json</text>
  <text x="458" y="272" fill="#ccfbf1" font-family="Segoe UI, Arial, sans-serif" font-size="16">XmlSerializer and LINQ to XML</text>
  <text x="458" y="296" fill="#ccfbf1" font-family="Segoe UI, Arial, sans-serif" font-size="16">Contracts, options, versioning</text>

  <rect x="820" y="150" width="320" height="190" rx="18" fill="#7c3aed"/>
  <text x="848" y="192" fill="#f5f3ff" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Binary Data</text>
  <text x="848" y="224" fill="#ede9fe" font-family="Segoe UI, Arial, sans-serif" font-size="16">BinaryReader / BinaryWriter</text>
  <text x="848" y="248" fill="#ede9fe" font-family="Segoe UI, Arial, sans-serif" font-size="16">MemoryStream and buffers</text>
  <text x="848" y="272" fill="#ede9fe" font-family="Segoe UI, Arial, sans-serif" font-size="16">Custom compact formats</text>
  <text x="848" y="296" fill="#ede9fe" font-family="Segoe UI, Arial, sans-serif" font-size="16">BinaryFormatter risks and modern alternatives</text>
</svg>
