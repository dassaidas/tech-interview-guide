<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300" role="img" aria-label="C# OOP Pillars">
<defs>
<style>
.bg { fill: #fbf8f4; }
.box { fill: #ffffff; stroke: #915c2d; stroke-width: 2.4; rx: 18; ry: 18; }
.line { stroke: #915c2d; stroke-width: 3; fill: none; }
.title { font: 700 28px Segoe UI, Arial, sans-serif; fill: #915c2d; }
.text { font: 700 16px Segoe UI, Arial, sans-serif; fill: #915c2d; }
</style>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#915c2d" /></marker>
</defs>
<rect class="bg" width="900" height="300" />
<text x="40" y="48" class="title">C# OOP Pillars</text>
<rect x="40" y="118" width="140" height="92" class="box" />
<text x="110" y="152" text-anchor="middle" class="text">Encapsulation</text>
<rect x="267" y="118" width="140" height="92" class="box" />
<text x="337" y="152" text-anchor="middle" class="text">Abstraction</text>
<rect x="493" y="118" width="140" height="92" class="box" />
<text x="563" y="152" text-anchor="middle" class="text">Inheritance</text>
<rect x="720" y="118" width="140" height="92" class="box" />
<text x="790" y="152" text-anchor="middle" class="text">Polymorphism</text>
<path class="line" marker-end="url(#arrow)" d="M180 164 H267" />
<path class="line" marker-end="url(#arrow)" d="M407 164 H493" />
<path class="line" marker-end="url(#arrow)" d="M633 164 H720" />
</svg>